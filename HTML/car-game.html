<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小车驾驶</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        canvas { display: block; }
        
        .hud {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            z-index: 10;
        }
        
        .hud-item {
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 10px;
            backdrop-filter: blur(5px);
        }
        
        .hud-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        
        .hud-value {
            font-size: 24px;
            font-weight: bold;
        }
        
        .minimap {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 180px;
            height: 180px;
            background: rgba(0,0,0,0.7);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            z-index: 10;
        }
        
        .controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            z-index: 10;
        }
        
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10,10,20,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .start-screen h1 {
            font-size: 60px;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(78,205,196,0.5);
        }
        
        .start-screen p {
            color: rgba(255,255,255,0.6);
            margin-bottom: 40px;
        }
        
        .start-btn {
            padding: 15px 60px;
            font-size: 20px;
            background: linear-gradient(135deg, #4ecdc4, #45b7d1);
            border: none;
            border-radius: 50px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(78,205,196,0.5);
        }
        
        .key-hint {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        .key-box {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
        }
        
        .speed-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 4px;
            overflow: hidden;
            z-index: 10;
        }
        
        .speed-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #ff6b6b);
            width: 0%;
            transition: width 0.1s;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="hud">
        <div class="hud-item">
            <div class="hud-label">速度</div>
            <div class="hud-value" id="speedDisplay">0 km/h</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">得分</div>
            <div class="hud-value" id="scoreDisplay">0</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">时间</div>
            <div class="hud-value" id="timeDisplay">0:00</div>
        </div>
    </div>
    
    <canvas class="minimap" id="minimap" width="180" height="180"></canvas>
    
    <div class="speed-bar">
        <div class="speed-fill" id="speedFill"></div>
    </div>
    
    <div class="controls">
        WASD / 方向键控制 | 空格手刹
    </div>
    
    <div class="start-screen" id="startScreen">
        <h1>小车驾驶</h1>
        <p>在地图上驾驶，收集金币，避开障碍物</p>
        <div class="key-hint">
            <div class="key-box">W</div>
            <div style="display:flex;flex-direction:column;gap:10px;">
                <div style="display:flex;gap:10px;">
                    <div class="key-box">A</div>
                    <div class="key-box">S</div>
                    <div class="key-box">D</div>
                </div>
            </div>
        </div>
        <button class="start-btn" id="startBtn">开始游戏</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const minimapCanvas = document.getElementById('minimap');
        const minimapCtx = minimapCanvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // 地图大小
        const MAP_WIDTH = 4000;
        const MAP_HEIGHT = 4000;
        
        // 游戏状态
        let gameRunning = false;
        let score = 0;
        let startTime = 0;
        
        // 小车
        const car = {
            x: MAP_WIDTH / 2,
            y: MAP_HEIGHT / 2,
            angle: -Math.PI / 2,
            speed: 0,
            maxSpeed: 8,
            acceleration: 0.15,
            friction: 0.98,
            turnSpeed: 0.04,
            width: 30,
            height: 50,
            drifting: false
        };
        
        // 摄像机
        const camera = {
            x: 0,
            y: 0
        };
        
        // 按键状态
        const keys = {
            w: false, a: false, s: false, d: false,
            ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false,
            space: false
        };
        
        // 障碍物
        let obstacles = [];
        let coins = [];
        let particles = [];
        let skidMarks = [];
        
        // 生成障碍物
        function generateObstacles() {
            obstacles = [];
            coins = [];
            
            // 树木
            for (let i = 0; i < 150; i++) {
                obstacles.push({
                    type: 'tree',
                    x: Math.random() * MAP_WIDTH,
                    y: Math.random() * MAP_HEIGHT,
                    radius: 15 + Math.random() * 15
                });
            }
            
            // 岩石
            for (let i = 0; i < 80; i++) {
                obstacles.push({
                    type: 'rock',
                    x: Math.random() * MAP_WIDTH,
                    y: Math.random() * MAP_HEIGHT,
                    radius: 20 + Math.random() * 25
                });
            }
            
            // 建筑物
            for (let i = 0; i < 30; i++) {
                const w = 60 + Math.random() * 80;
                const h = 60 + Math.random() * 80;
                obstacles.push({
                    type: 'building',
                    x: Math.random() * (MAP_WIDTH - w),
                    y: Math.random() * (MAP_HEIGHT - h),
                    width: w,
                    height: h
                });
            }
            
            // 水坑
            for (let i = 0; i < 20; i++) {
                obstacles.push({
                    type: 'water',
                    x: Math.random() * MAP_WIDTH,
                    y: Math.random() * MAP_HEIGHT,
                    radius: 40 + Math.random() * 40
                });
            }
            
            // 金币
            for (let i = 0; i < 100; i++) {
                coins.push({
                    x: Math.random() * MAP_WIDTH,
                    y: Math.random() * MAP_HEIGHT,
                    radius: 12,
                    collected: false,
                    bobOffset: Math.random() * Math.PI * 2
                });
            }
        }
        
        // 绘制地面
        function drawGround() {
            // 草地背景
            ctx.fillStyle = '#2d5a27';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 网格
            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.lineWidth = 1;
            
            const gridSize = 100;
            const offsetX = -camera.x % gridSize;
            const offsetY = -camera.y % gridSize;
            
            for (let x = offsetX; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            for (let y = offsetY; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // 道路
            ctx.fillStyle = '#3a3a3a';
            // 横向道路
            ctx.fillRect(-camera.x, 800 - camera.y, MAP_WIDTH, 120);
            ctx.fillRect(-camera.x, 2000 - camera.y, MAP_WIDTH, 120);
            ctx.fillRect(-camera.x, 3200 - camera.y, MAP_WIDTH, 120);
            // 纵向道路
            ctx.fillRect(800 - camera.x, -camera.y, 120, MAP_HEIGHT);
            ctx.fillRect(2000 - camera.x, -camera.y, 120, MAP_HEIGHT);
            ctx.fillRect(3200 - camera.x, -camera.y, 120, MAP_HEIGHT);
            
            // 道路标线
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.setLineDash([30, 30]);
            
            // 横向标线
            [860, 2060, 3260].forEach(y => {
                ctx.beginPath();
                ctx.moveTo(-camera.x, y - camera.y);
                ctx.lineTo(MAP_WIDTH - camera.x, y - camera.y);
                ctx.stroke();
            });
            
            // 纵向标线
            [860, 2060, 3260].forEach(x => {
                ctx.beginPath();
                ctx.moveTo(x - camera.x, -camera.y);
                ctx.lineTo(x - camera.x, MAP_HEIGHT - camera.y);
                ctx.stroke();
            });
            
            ctx.setLineDash([]);
        }
        
        // 绘制滑痕
        function drawSkidMarks() {
            skidMarks.forEach((mark, i) => {
                const alpha = Math.max(0, 1 - (Date.now() - mark.time) / 5000);
                if (alpha <= 0) {
                    skidMarks.splice(i, 1);
                    return;
                }
                ctx.fillStyle = `rgba(30,30,30,${alpha * 0.5})`;
                ctx.beginPath();
                ctx.arc(mark.x - camera.x, mark.y - camera.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        // 绘制障碍物
        function drawObstacles() {
            obstacles.forEach(obs => {
                const sx = obs.x - camera.x;
                const sy = obs.y - camera.y;
                
                if (sx < -100 || sx > canvas.width + 100 || sy < -100 || sy > canvas.height + 100) return;
                
                if (obs.type === 'tree') {
                    // 树干
                    ctx.fillStyle = '#5d4037';
                    ctx.fillRect(sx - 5, sy - 5, 10, 10);
                    // 树冠
                    ctx.fillStyle = '#2e7d32';
                    ctx.beginPath();
                    ctx.arc(sx, sy - 10, obs.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#388e3c';
                    ctx.beginPath();
                    ctx.arc(sx - 5, sy - 15, obs.radius * 0.7, 0, Math.PI * 2);
                    ctx.fill();
                } else if (obs.type === 'rock') {
                    ctx.fillStyle = '#616161';
                    ctx.beginPath();
                    ctx.arc(sx, sy, obs.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#757575';
                    ctx.beginPath();
                    ctx.arc(sx - 5, sy - 5, obs.radius * 0.6, 0, Math.PI * 2);
                    ctx.fill();
                } else if (obs.type === 'building') {
                    // 建筑主体
                    ctx.fillStyle = '#455a64';
                    ctx.fillRect(sx, sy, obs.width, obs.height);
                    // 窗户
                    ctx.fillStyle = '#ffeb3b';
                    for (let wx = 10; wx < obs.width - 10; wx += 20) {
                        for (let wy = 10; wy < obs.height - 10; wy += 20) {
                            ctx.fillRect(sx + wx, sy + wy, 12, 12);
                        }
                    }
                    // 轮廓
                    ctx.strokeStyle = '#37474f';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(sx, sy, obs.width, obs.height);
                } else if (obs.type === 'water') {
                    ctx.fillStyle = 'rgba(33, 150, 243, 0.6)';
                    ctx.beginPath();
                    ctx.arc(sx, sy, obs.radius, 0, Math.PI * 2);
                    ctx.fill();
                    // 水波
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 2;
                    const wave = Math.sin(Date.now() * 0.003) * 5;
                    ctx.beginPath();
                    ctx.arc(sx, sy, obs.radius * 0.6 + wave, 0, Math.PI * 2);
                    ctx.stroke();
                }
            });
        }
        
        // 绘制金币
        function drawCoins() {
            coins.forEach(coin => {
                if (coin.collected) return;
                
                const sx = coin.x - camera.x;
                const sy = coin.y - camera.y;
                
                if (sx < -50 || sx > canvas.width + 50 || sy < -50 || sy > canvas.height + 50) return;
                
                const bob = Math.sin(Date.now() * 0.005 + coin.bobOffset) * 3;
                
                // 光晕
                ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
                ctx.beginPath();
                ctx.arc(sx, sy + bob, coin.radius + 5, 0, Math.PI * 2);
                ctx.fill();
                
                // 金币
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(sx, sy + bob, coin.radius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#ffb300';
                ctx.beginPath();
                ctx.arc(sx, sy + bob, coin.radius * 0.6, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', sx, sy + bob);
            });
        }
        
        // 绘制小车
        function drawCar() {
            const sx = car.x - camera.x;
            const sy = car.y - camera.y;
            
            ctx.save();
            ctx.translate(sx, sy);
            ctx.rotate(car.angle + Math.PI / 2);
            
            // 车身阴影
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(-car.width / 2 + 3, -car.height / 2 + 3, car.width, car.height);
            
            // 车身
            const gradient = ctx.createLinearGradient(-car.width / 2, 0, car.width / 2, 0);
            gradient.addColorStop(0, '#e53935');
            gradient.addColorStop(0.5, '#f44336');
            gradient.addColorStop(1, '#e53935');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(-car.width / 2, -car.height / 2, car.width, car.height, 8);
            ctx.fill();
            
            // 车顶
            ctx.fillStyle = '#c62828';
            ctx.fillRect(-car.width / 2 + 5, -car.height / 2 + 12, car.width - 10, 20);
            
            // 挡风玻璃
            ctx.fillStyle = '#90caf9';
            ctx.fillRect(-car.width / 2 + 6, -car.height / 2 + 8, car.width - 12, 8);
            
            // 后窗
            ctx.fillStyle = '#90caf9';
            ctx.fillRect(-car.width / 2 + 8, car.height / 2 - 18, car.width - 16, 8);
            
            // 车轮
            ctx.fillStyle = '#212121';
            ctx.fillRect(-car.width / 2 - 4, -car.height / 2 + 5, 6, 12);
            ctx.fillRect(car.width / 2 - 2, -car.height / 2 + 5, 6, 12);
            ctx.fillRect(-car.width / 2 - 4, car.height / 2 - 17, 6, 12);
            ctx.fillRect(car.width / 2 - 2, car.height / 2 - 17, 6, 12);
            
            // 车灯
            ctx.fillStyle = '#ffeb3b';
            ctx.beginPath();
            ctx.arc(-car.width / 2 + 6, -car.height / 2 + 2, 4, 0, Math.PI * 2);
            ctx.arc(car.width / 2 - 6, -car.height / 2 + 2, 4, 0, Math.PI * 2);
            ctx.fill();
            
            // 尾灯
            ctx.fillStyle = '#ff1744';
            ctx.beginPath();
            ctx.arc(-car.width / 2 + 6, car.height / 2 - 2, 3, 0, Math.PI * 2);
            ctx.arc(car.width / 2 - 6, car.height / 2 - 2, 3, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
            
            // 车灯光线
            if (Math.abs(car.speed) > 0.5) {
                ctx.save();
                ctx.translate(sx, sy);
                ctx.rotate(car.angle + Math.PI / 2);
                
                const lightGrad = ctx.createRadialGradient(0, -car.height / 2, 0, 0, -car.height / 2 - 80, 60);
                lightGrad.addColorStop(0, 'rgba(255,255,200,0.3)');
                lightGrad.addColorStop(1, 'transparent');
                ctx.fillStyle = lightGrad;
                ctx.beginPath();
                ctx.moveTo(-car.width / 2 + 6, -car.height / 2);
                ctx.lineTo(-30, -car.height / 2 - 100);
                ctx.lineTo(30, -car.height / 2 - 100);
                ctx.lineTo(car.width / 2 - 6, -car.height / 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // 绘制粒子
        function drawParticles() {
            particles.forEach((p, i) => {
                p.life -= 0.02;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    return;
                }
                
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                
                ctx.fillStyle = `rgba(${p.color}, ${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x - camera.x, p.y - camera.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        // 创建粒子
        function createParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8 - 2,
                    size: 3 + Math.random() * 5,
                    life: 1,
                    color
                });
            }
        }
        
        // 碰撞检测
        function checkCollision() {
            for (let obs of obstacles) {
                if (obs.type === 'tree' || obs.type === 'rock') {
                    const dx = car.x - obs.x;
                    const dy = car.y - obs.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const minDist = obs.radius + car.width / 2;
                    
                    if (dist < minDist) {
                        const angle = Math.atan2(dy, dx);
                        car.x = obs.x + Math.cos(angle) * minDist;
                        car.y = obs.y + Math.sin(angle) * minDist;
                        car.speed *= -0.3;
                        createParticles(car.x, car.y, '255,150,50', 8);
                        return true;
                    }
                } else if (obs.type === 'building') {
                    if (car.x > obs.x - car.width / 2 && car.x < obs.x + obs.width + car.width / 2 &&
                        car.y > obs.y - car.height / 2 && car.y < obs.y + obs.height + car.height / 2) {
                        
                        // 简单推出
                        const cx = obs.x + obs.width / 2;
                        const cy = obs.y + obs.height / 2;
                        const angle = Math.atan2(car.y - cy, car.x - cx);
                        car.x += Math.cos(angle) * 5;
                        car.y += Math.sin(angle) * 5;
                        car.speed *= -0.3;
                        createParticles(car.x, car.y, '255,150,50', 8);
                        return true;
                    }
                } else if (obs.type === 'water') {
                    const dx = car.x - obs.x;
                    const dy = car.y - obs.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < obs.radius) {
                        car.speed *= 0.95; // 水中减速
                        car.drifting = true;
                    }
                }
            }
            
            // 边界
            car.x = Math.max(car.width / 2, Math.min(MAP_WIDTH - car.width / 2, car.x));
            car.y = Math.max(car.height / 2, Math.min(MAP_HEIGHT - car.height / 2, car.y));
            
            return false;
        }
        
        // 检查金币收集
        function checkCoins() {
            coins.forEach(coin => {
                if (coin.collected) return;
                
                const dx = car.x - coin.x;
                const dy = car.y - coin.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < coin.radius + car.width / 2) {
                    coin.collected = true;
                    score += 100;
                    createParticles(coin.x, coin.y, '255,215,0', 15);
                    document.getElementById('scoreDisplay').textContent = score;
                }
            });
        }
        
        // 更新小车
        function updateCar() {
            const forward = keys.w || keys.ArrowUp;
            const backward = keys.s || keys.ArrowDown;
            const left = keys.a || keys.ArrowLeft;
            const right = keys.d || keys.ArrowRight;
            const handbrake = keys.space;
            
            // 加速
            if (forward) {
                car.speed = Math.min(car.speed + car.acceleration, car.maxSpeed);
            }
            if (backward) {
                car.speed = Math.max(car.speed - car.acceleration, -car.maxSpeed * 0.5);
            }
            
            // 转向（速度越快转向越明显）
            const turnFactor = Math.min(Math.abs(car.speed) / 3, 1);
            if (left) {
                car.angle -= car.turnSpeed * turnFactor * (car.speed >= 0 ? 1 : -1);
            }
            if (right) {
                car.angle += car.turnSpeed * turnFactor * (car.speed >= 0 ? 1 : -1);
            }
            
            // 漂移
            car.drifting = handbrake && Math.abs(car.speed) > 2;
            if (handbrake) {
                car.speed *= 0.98;
            }
            
            // 摩擦力
            car.speed *= car.friction;
            
            if (Math.abs(car.speed) < 0.01) car.speed = 0;
            
            // 移动
            car.x += Math.cos(car.angle) * car.speed;
            car.y += Math.sin(car.angle) * car.speed;
            
            // 滑痕
            if (car.drifting && Math.abs(car.speed) > 1) {
                const rearX = car.x - Math.cos(car.angle) * car.height / 2;
                const rearY = car.y - Math.sin(car.angle) * car.height / 2;
                skidMarks.push({ x: rearX - 8, y: rearY, time: Date.now() });
                skidMarks.push({ x: rearX + 8, y: rearY, time: Date.now() });
            }
            
            // 碰撞
            checkCollision();
            checkCoins();
            
            // 更新显示
            document.getElementById('speedDisplay').textContent = Math.abs(Math.round(car.speed * 15)) + ' km/h';
            document.getElementById('speedFill').style.width = (Math.abs(car.speed) / car.maxSpeed * 100) + '%';
            
            // 时间
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            document.getElementById('timeDisplay').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        // 更新摄像机
        function updateCamera() {
            const targetX = car.x - canvas.width / 2;
            const targetY = car.y - canvas.height / 2;
            
            camera.x += (targetX - camera.x) * 0.1;
            camera.y += (targetY - camera.y) * 0.1;
        }
        
        // 绘制小地图
        function drawMinimap() {
            minimapCtx.fillStyle = 'rgba(30,60,30,0.9)';
            minimapCtx.fillRect(0, 0, 180, 180);
            
            const scale = 180 / MAP_WIDTH;
            
            // 道路
            minimapCtx.fillStyle = 'rgba(100,100,100,0.5)';
            minimapCtx.fillRect(0, 800 * scale, 180, 120 * scale);
            minimapCtx.fillRect(0, 2000 * scale, 180, 120 * scale);
            minimapCtx.fillRect(0, 3200 * scale, 180, 120 * scale);
            minimapCtx.fillRect(800 * scale, 0, 120 * scale, 180);
            minimapCtx.fillRect(2000 * scale, 0, 120 * scale, 180);
            minimapCtx.fillRect(3200 * scale, 0, 120 * scale, 180);
            
            // 障碍物
            obstacles.forEach(obs => {
                const x = obs.x * scale;
                const y = obs.y * scale;
                
                if (obs.type === 'building') {
                    minimapCtx.fillStyle = 'rgba(100,100,100,0.8)';
                    minimapCtx.fillRect(x, y, obs.width * scale, obs.height * scale);
                } else if (obs.type === 'water') {
                    minimapCtx.fillStyle = 'rgba(33,150,243,0.6)';
                    minimapCtx.beginPath();
                    minimapCtx.arc(x, y, obs.radius * scale, 0, Math.PI * 2);
                    minimapCtx.fill();
                }
            });
            
            // 金币
            minimapCtx.fillStyle = '#ffd700';
            coins.forEach(coin => {
                if (!coin.collected) {
                    minimapCtx.beginPath();
                    minimapCtx.arc(coin.x * scale, coin.y * scale, 2, 0, Math.PI * 2);
                    minimapCtx.fill();
                }
            });
            
            // 玩家
            minimapCtx.fillStyle = '#f44336';
            minimapCtx.save();
            minimapCtx.translate(car.x * scale, car.y * scale);
            minimapCtx.rotate(car.angle);
            minimapCtx.fillRect(-3, -5, 6, 10);
            minimapCtx.restore();
            
            // 视野框
            minimapCtx.strokeStyle = 'rgba(255,255,255,0.5)';
            minimapCtx.lineWidth = 1;
            minimapCtx.strokeRect(
                camera.x * scale,
                camera.y * scale,
                canvas.width * scale,
                canvas.height * scale
            );
        }
        
        // 主循环
        function gameLoop() {
            if (!gameRunning) return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawGround();
            drawSkidMarks();
            drawObstacles();
            drawCoins();
            drawCar();
            drawParticles();
            
            updateCar();
            updateCamera();
            
            drawMinimap();
            
            requestAnimationFrame(gameLoop);
        }
        
        // 开始游戏
        function startGame() {
            generateObstacles();
            car.x = MAP_WIDTH / 2;
            car.y = MAP_HEIGHT / 2;
            car.speed = 0;
            car.angle = -Math.PI / 2;
            score = 0;
            startTime = Date.now();
            skidMarks = [];
            particles = [];
            
            document.getElementById('scoreDisplay').textContent = '0';
            document.getElementById('startScreen').style.display = 'none';
            
            gameRunning = true;
            gameLoop();
        }
        
        // 键盘事件
        document.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            if (key in keys) keys[key] = true;
            if (e.key in keys) keys[e.key] = true;
            if (key === ' ') keys.space = true;
        });
        
        document.addEventListener('keyup', e => {
            const key = e.key.toLowerCase();
            if (key in keys) keys[key] = false;
            if (e.key in keys) keys[e.key] = false;
            if (key === ' ') keys.space = false;
        });
        
        // 窗口调整
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // 开始按钮
        document.getElementById('startBtn').addEventListener('click', startGame);
    </script>
</body>
</html>
