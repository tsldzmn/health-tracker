<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 魔方仿真 - 自动还原</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            overflow: hidden;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #canvas-container {
            width: 100%;
            height: 100%;
        }
        
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            min-width: 200px;
        }
        
        .controls h2 {
            margin-bottom: 15px;
            font-size: 18px;
            color: #4CAF50;
        }
        
        .controls button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 5px;
            background: #4CAF50;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .controls button:hover:not(:disabled) {
            background: #45a049;
        }
        
        .controls button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        .controls button.secondary {
            background: #2196F3;
        }
        
        .controls button.secondary:hover:not(:disabled) {
            background: #0b7dda;
        }
        
        .controls button.danger {
            background: #f44336;
        }
        
        .controls button.danger:hover:not(:disabled) {
            background: #da190b;
        }
        
        .status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            backdrop-filter: blur(10px);
        }
        
        .move-display {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            min-width: 120px;
            text-align: center;
        }
        
        .move-display h3 {
            margin-bottom: 10px;
            color: #FF9800;
        }
        
        .move-display .current-move {
            font-size: 24px;
            font-weight: bold;
            min-height: 30px;
        }
        
        .instructions {
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            font-size: 12px;
            max-width: 300px;
        }
        
        .instructions h4 {
            margin-bottom: 8px;
            color: #E91E63;
        }
        
        .instructions ul {
            list-style: none;
            padding-left: 0;
        }
        
        .instructions li {
            margin: 4px 0;
            color: #ccc;
        }
        
        .instructions strong {
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="canvas-container"></div>
        
        <div class="controls">
            <h2>魔方控制</h2>
            <button id="scrambleBtn">打乱魔方</button>
            <button id="solveBtn" class="secondary" disabled>自动还原</button>
            <button id="resetBtn" class="danger">重置魔方</button>
            <div style="margin-top: 15px; border-top: 1px solid #555; padding-top: 15px;">
                <button id="rotateXBtn">X轴旋转</button>
                <button id="rotateYBtn">Y轴旋转</button>
                <button id="rotateZBtn">Z轴旋转</button>
            </div>
        </div>
        
        <div class="move-display">
            <h3>当前操作</h3>
            <div class="current-move" id="currentMove">-</div>
        </div>
        
        <div class="instructions">
            <h4>操作说明</h4>
            <ul>
                <li><strong>鼠标左键拖动</strong>：旋转视角</li>
                <li><strong>鼠标右键拖动</strong>：平移视角</li>
                <li><strong>滚轮</strong>：缩放</li>
                <li><strong>点击按钮</strong>：执行相应操作</li>
            </ul>
        </div>
        
        <div class="status" id="status">准备就绪</div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls for Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- Cube.js library for Rubik's cube solving -->
    <script src="https://cdn.jsdelivr.net/npm/cubejs@1.3.2/lib/cube.js"></script>

    <script>
        // Global variables
        let scene, camera, renderer, controls;
        let rubiksCube = {
            cubies: [],
            state: null,
            isAnimating: false,
            animationQueue: []
        };
        
        // Standard Rubik's cube colors
        const COLORS = {
            white: 0xffffff,
            yellow: 0xffff00,
            red: 0xff0000,
            orange: 0xff8c00,
            blue: 0x0000ff,
            green: 0x00ff00,
            black: 0x000000
        };
        
        // Initialize Three.js scene
        function initScene() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            
            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(8, 6, 8);
            camera.lookAt(0, 0, 0);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = true;
            controls.minDistance = 5;
            controls.maxDistance = 50;
            
            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            scene.add(directionalLight);
            
            const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
            directionalLight2.position.set(-10, -10, -10);
            scene.add(directionalLight2);
            
            // Handle window resize
            window.addEventListener('resize', onWindowResize);
        }
        
        // Create a single cubie with 6 faces
        function createCubie(x, y, z) {
            const geometry = new THREE.BoxGeometry(0.95, 0.95, 0.95);
            
            // Create materials for each face
            // Order: +x, -x, +y, -y, +z, -z
            const materials = [
                // Right face (+x)
                new THREE.MeshPhongMaterial({ color: COLORS.black, shininess: 30 }),
                // Left face (-x)
                new THREE.MeshPhongMaterial({ color: COLORS.black, shininess: 30 }),
                // Top face (+y)
                new THREE.MeshPhongMaterial({ color: COLORS.black, shininess: 30 }),
                // Bottom face (-y)
                new THREE.MeshPhongMaterial({ color: COLORS.black, shininess: 30 }),
                // Front face (+z)
                new THREE.MeshPhongMaterial({ color: COLORS.black, shininess: 30 }),
                // Back face (-z)
                new THREE.MeshPhongMaterial({ color: COLORS.black, shininess: 30 })
            ];
            
            const cubie = new THREE.Mesh(geometry, materials);
            cubie.position.set(x, y, z);
            
            // Store original position and current rotation
            cubie.userData = {
                originalX: x,
                originalY: y,
                originalZ: z,
                currentRotation: { x: 0, y: 0, z: 0 }
            };
            
            return cubie;
        }
        
        // Create the complete Rubik's cube
        function createRubiksCube() {
            // Clear existing cubies
            rubiksCube.cubies.forEach(cubie => scene.remove(cubie));
            rubiksCube.cubies = [];
            
            // Create 27 cubies (3x3x3)
            for (let x = -1; x <= 1; x++) {
                for (let y = -1; y <= 1; y++) {
                    for (let z = -1; z <= 1; z++) {
                        const cubie = createCubie(x, y, z);
                        scene.add(cubie);
                        rubiksCube.cubies.push(cubie);
                    }
                }
            }
            
            // Initialize cube state
            initializeCubeState();
            
            // Color the cube faces
            colorCubeFaces();
        }
        
        // Initialize cube state using cubejs library
        function initializeCubeState() {
            try {
                if (typeof Cube !== 'undefined') {
                    // Create a solved cube state
                    rubiksCube.state = new Cube();
                    console.log('Cube.js loaded successfully. State initialized.');
                } else {
                    console.warn('Cube.js library not loaded, using simple state management');
                    rubiksCube.state = {
                        solved: true,
                        moves: []
                    };
                }
            } catch (error) {
                console.error('Error initializing cube state:', error);
                rubiksCube.state = { solved: true, moves: [] };
            }
        }
        
        // Color the faces of the Rubik's cube based on position
        function colorCubeFaces() {
            rubiksCube.cubies.forEach(cubie => {
                const x = Math.round(cubie.position.x);
                const y = Math.round(cubie.position.y);
                const z = Math.round(cubie.position.z);
                
                // Color each face based on its position
                // Right face (+x)
                if (x === 1) {
                    cubie.material[0].color.setHex(COLORS.red);
                }
                // Left face (-x)
                if (x === -1) {
                    cubie.material[1].color.setHex(COLORS.orange);
                }
                // Top face (+y)
                if (y === 1) {
                    cubie.material[2].color.setHex(COLORS.white);
                }
                // Bottom face (-y)
                if (y === -1) {
                    cubie.material[3].color.setHex(COLORS.yellow);
                }
                // Front face (+z)
                if (z === 1) {
                    cubie.material[4].color.setHex(COLORS.green);
                }
                // Back face (-z)
                if (z === -1) {
                    cubie.material[5].color.setHex(COLORS.blue);
                }
            });
        }
        
        // Rotate a layer of the cube
        function rotateLayer(axis, layer, direction, duration = 500) {
            if (rubiksCube.isAnimating) {
                console.log('Already animating, queuing move');
                rubiksCube.animationQueue.push({ axis, layer, direction, duration });
                return;
            }
            
            rubiksCube.isAnimating = true;
            const startTime = Date.now();
            const angle = (direction === 1 ? -Math.PI / 2 : Math.PI / 2);
            
            // Find cubies in the specified layer
            const layerCubies = rubiksCube.cubies.filter(cubie => {
                const pos = cubie.position.clone();
                switch (axis) {
                    case 'x': return Math.abs(pos.x - layer) < 0.1;
                    case 'y': return Math.abs(pos.y - layer) < 0.1;
                    case 'z': return Math.abs(pos.z - layer) < 0.1;
                }
            });
            
            // Create a pivot group for rotation
            const pivot = new THREE.Group();
            scene.add(pivot);
            
            // Add cubies to pivot
            layerCubies.forEach(cubie => {
                scene.remove(cubie);
                pivot.add(cubie);
            });
            
            // Animate rotation
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeProgress = easeInOutCubic(progress);
                const currentAngle = angle * easeProgress;
                
                // Reset rotation
                pivot.rotation.set(0, 0, 0);
                
                // Apply rotation based on axis
                switch (axis) {
                    case 'x': pivot.rotation.x = currentAngle; break;
                    case 'y': pivot.rotation.y = currentAngle; break;
                    case 'z': pivot.rotation.z = currentAngle; break;
                }
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    // Update cubie positions and rotations
                    layerCubies.forEach(cubie => {
                        // Apply rotation to cubie's world position
                        const worldPos = new THREE.Vector3();
                        cubie.getWorldPosition(worldPos);
                        
                        // Apply rotation to cubie's rotation
                        const rotationMatrix = new THREE.Matrix4();
                        rotationMatrix.makeRotationFromEuler(pivot.rotation);
                        
                        cubie.applyMatrix4(rotationMatrix);
                        
                        // Snap to grid
                        cubie.position.set(
                            Math.round(cubie.position.x),
                            Math.round(cubie.position.y),
                            Math.round(cubie.position.z)
                        );
                        
                        // Update rotation
                        cubie.rotation.set(
                            snapRotation(cubie.rotation.x),
                            snapRotation(cubie.rotation.y),
                            snapRotation(cubie.rotation.z)
                        );
                        
                        scene.add(cubie);
                    });
                    
                    scene.remove(pivot);
                    rubiksCube.isAnimating = false;
                    
                    // Update cube state
                    updateCubeState(axis, layer, direction);
                    
                    // Process next animation in queue
                    if (rubiksCube.animationQueue.length > 0) {
                        const nextAnim = rubiksCube.animationQueue.shift();
                        setTimeout(() => {
                            rotateLayer(nextAnim.axis, nextAnim.layer, nextAnim.direction, nextAnim.duration);
                        }, 100);
                    }
                }
            }
            
            animate();
        }
        
        // Easing function for smooth animation
        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }
        
        // Snap rotation to 90-degree increments
        function snapRotation(angle) {
            const tolerance = 0.1;
            const snapped = Math.round(angle / (Math.PI / 2)) * (Math.PI / 2);
            return Math.abs(angle - snapped) < tolerance ? snapped : angle;
        }
        
        // Update cube state after rotation
        function updateCubeState(axis, layer, direction) {
            if (typeof Cube !== 'undefined' && rubiksCube.state instanceof Cube) {
                // Map our rotation to cube.js moves
                let move = '';
                const dir = direction === 1 ? '' : "'";
                
                if (axis === 'x') {
                    if (layer === 1) move = 'R' + dir;
                    else if (layer === -1) move = 'L' + dir;
                    else move = 'M' + dir;
                } else if (axis === 'y') {
                    if (layer === 1) move = 'U' + dir;
                    else if (layer === -1) move = 'D' + dir;
                    else move = 'E' + dir;
                } else if (axis === 'z') {
                    if (layer === 1) move = 'F' + dir;
                    else if (layer === -1) move = 'B' + dir;
                    else move = 'S' + dir;
                }
                
                if (move) {
                    try {
                        rubiksCube.state.move(move);
                        console.log(`Applied move: ${move}`);
                    } catch (error) {
                        console.error('Error applying move:', error);
                    }
                }
            }
        }
        
        // Scramble the cube with random moves
        function scrambleCube() {
            if (rubiksCube.isAnimating) {
                console.log('Cannot scramble while animating');
                return;
            }
            
            updateStatus('打乱中...');
            document.getElementById('scrambleBtn').disabled = true;
            document.getElementById('solveBtn').disabled = true;
            
            const moves = 20;
            const moveList = [];
            const axes = ['x', 'y', 'z'];
            const layers = [1, -1];
            const directions = [1, -1];
            
            for (let i = 0; i < moves; i++) {
                const axis = axes[Math.floor(Math.random() * axes.length)];
                const layer = layers[Math.floor(Math.random() * layers.length)];
                const direction = directions[Math.floor(Math.random() * directions.length)];
                
                moveList.push({ axis, layer, direction });
            }
            
            // Queue animations
            rubiksCube.animationQueue = moveList;
            
            // Start first animation
            if (moveList.length > 0) {
                const firstMove = moveList.shift();
                rotateLayer(firstMove.axis, firstMove.layer, firstMove.direction, 300);
                
                // Update UI periodically
                let moveIndex = 1;
                const updateInterval = setInterval(() => {
                    if (!rubiksCube.isAnimating && rubiksCube.animationQueue.length === 0) {
                        clearInterval(updateInterval);
                        updateStatus('打乱完成');
                        document.getElementById('scrambleBtn').disabled = false;
                        document.getElementById('solveBtn').disabled = false;
                        document.getElementById('currentMove').textContent = '-';
                    } else if (!rubiksCube.isAnimating && rubiksCube.animationQueue.length > 0) {
                        const nextMove = rubiksCube.animationQueue.shift();
                        rotateLayer(nextMove.axis, nextMove.layer, nextMove.direction, 300);
                        moveIndex++;
                        document.getElementById('currentMove').textContent = `打乱 ${moveIndex}/${moves}`;
                    }
                }, 400);
            }
        }
        
        // Solve the cube automatically
        function solveCube() {
            if (rubiksCube.isAnimating) {
                console.log('Cannot solve while animating');
                return;
            }
            
            updateStatus('计算还原步骤...');
            document.getElementById('scrambleBtn').disabled = true;
            document.getElementById('solveBtn').disabled = true;
            
            // Use cube.js solver if available
            if (typeof Cube !== 'undefined' && rubiksCube.state instanceof Cube) {
                try {
                    // Get solution from cube.js
                    const solution = rubiksCube.state.solve();
                    
                    if (solution && solution.length > 0) {
                        updateStatus('正在还原...');
                        const moves = solution.split(' ');
                        let moveIndex = 0;
                        
                        function nextMove() {
                            if (moveIndex >= moves.length) {
                                updateStatus('还原完成！');
                                document.getElementById('scrambleBtn').disabled = false;
                                document.getElementById('solveBtn').disabled = true;
                                document.getElementById('currentMove').textContent = '-';
                                return;
                            }
                            
                            const move = moves[moveIndex];
                            document.getElementById('currentMove').textContent = `${move} (${moveIndex + 1}/${moves.length})`;
                            
                            // Convert move notation to rotation
                            const rotation = convertMoveToRotation(move);
                            if (rotation) {
                                rotateLayer(rotation.axis, rotation.layer, rotation.direction, 500);
                                
                                // Wait for animation to complete
                                setTimeout(() => {
                                    moveIndex++;
                                    nextMove();
                                }, 600);
                            } else {
                                moveIndex++;
                                nextMove();
                            }
                        }
                        
                        nextMove();
                    } else {
                        // If no solution found (cube might be solved), just reset
                        updateStatus('魔方已还原');
                        document.getElementById('scrambleBtn').disabled = false;
                        document.getElementById('solveBtn').disabled = true;
                    }
                } catch (error) {
                    console.error('Solving error:', error);
                    updateStatus('还原失败，重置魔方');
                    setTimeout(resetCube, 1000);
                }
            } else {
                // Simple fallback: reset to solved state
                setTimeout(() => {
                    resetCube();
                    updateStatus('已重置到还原状态');
                    document.getElementById('scrambleBtn').disabled = false;
                    document.getElementById('solveBtn').disabled = true;
                }, 1000);
            }
        }
        
        // Convert cube.js move notation to our rotation system
        function convertMoveToRotation(move) {
            const moveMap = {
                'R': { axis: 'x', layer: 1, direction: -1 },
                'R\'': { axis: 'x', layer: 1, direction: 1 },
                'R2': { axis: 'x', layer: 1, direction: -1 }, // Single rotation for simplicity
                'L': { axis: 'x', layer: -1, direction: 1 },
                'L\'': { axis: 'x', layer: -1, direction: -1 },
                'L2': { axis: 'x', layer: -1, direction: 1 },
                'U': { axis: 'y', layer: 1, direction: -1 },
                'U\'': { axis: 'y', layer: 1, direction: 1 },
                'U2': { axis: 'y', layer: 1, direction: -1 },
                'D': { axis: 'y', layer: -1, direction: 1 },
                'D\'': { axis: 'y', layer: -1, direction: -1 },
                'D2': { axis: 'y', layer: -1, direction: 1 },
                'F': { axis: 'z', layer: 1, direction: -1 },
                'F\'': { axis: 'z', layer: 1, direction: 1 },
                'F2': { axis: 'z', layer: 1, direction: -1 },
                'B': { axis: 'z', layer: -1, direction: 1 },
                'B\'': { axis: 'z', layer: -1, direction: -1 },
                'B2': { axis: 'z', layer: -1, direction: 1 },
                // Middle layer moves
                'M': { axis: 'x', layer: 0, direction: 1 },
                'M\'': { axis: 'x', layer: 0, direction: -1 },
                'E': { axis: 'y', layer: 0, direction: 1 },
                'E\'': { axis: 'y', layer: 0, direction: -1 },
                'S': { axis: 'z', layer: 0, direction: 1 },
                'S\'': { axis: 'z', layer: 0, direction: -1 }
            };
            
            return moveMap[move] || null;
        }
        
        // Reset the cube to solved state
        function resetCube() {
            if (rubiksCube.isAnimating) return;
            
            // Remove all cubies
            rubiksCube.cubies.forEach(cubie => scene.remove(cubie));
            rubiksCube.cubies = [];
            
            // Recreate cube
            createRubiksCube();
            
            updateStatus('已重置');
            document.getElementById('scrambleBtn').disabled = false;
            document.getElementById('solveBtn').disabled = true;
            document.getElementById('currentMove').textContent = '-';
        }
        
        // Rotate entire cube around X axis
        function rotateCubeX() {
            if (rubiksCube.isAnimating) return;
            
            const duration = 1000;
            const startTime = Date.now();
            const angle = Math.PI / 2;
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeProgress = easeInOutCubic(progress);
                const currentAngle = angle * easeProgress;
                
                // Rotate all cubies around world origin
                rubiksCube.cubies.forEach(cubie => {
                    const originalPos = new THREE.Vector3(
                        cubie.userData.originalX,
                        cubie.userData.originalY,
                        cubie.userData.originalZ
                    );
                    
                    // Rotate position
                    const newPos = originalPos.clone();
                    newPos.applyAxisAngle(new THREE.Vector3(1, 0, 0), currentAngle);
                    cubie.position.copy(newPos);
                    
                    // Rotate orientation
                    cubie.rotation.x = currentAngle;
                });
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    // Snap positions
                    rubiksCube.cubies.forEach(cubie => {
                        cubie.position.set(
                            Math.round(cubie.position.x),
                            Math.round(cubie.position.y),
                            Math.round(cubie.position.z)
                        );
                        
                        cubie.rotation.set(
                            snapRotation(cubie.rotation.x),
                            snapRotation(cubie.rotation.y),
                            snapRotation(cubie.rotation.z)
                        );
                    });
                    
                    // Update original positions
                    rubiksCube.cubies.forEach(cubie => {
                        cubie.userData.originalX = Math.round(cubie.position.x);
                        cubie.userData.originalY = Math.round(cubie.position.y);
                        cubie.userData.originalZ = Math.round(cubie.position.z);
                    });
                }
            }
            
            animate();
        }
        
        // Rotate entire cube around Y axis
        function rotateCubeY() {
            if (rubiksCube.isAnimating) return;
            
            const duration = 1000;
            const startTime = Date.now();
            const angle = Math.PI / 2;
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeProgress = easeInOutCubic(progress);
                const currentAngle = angle * easeProgress;
                
                rubiksCube.cubies.forEach(cubie => {
                    const originalPos = new THREE.Vector3(
                        cubie.userData.originalX,
                        cubie.userData.originalY,
                        cubie.userData.originalZ
                    );
                    
                    const newPos = originalPos.clone();
                    newPos.applyAxisAngle(new THREE.Vector3(0, 1, 0), currentAngle);
                    cubie.position.copy(newPos);
                    
                    cubie.rotation.y = currentAngle;
                });
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    rubiksCube.cubies.forEach(cubie => {
                        cubie.position.set(
                            Math.round(cubie.position.x),
                            Math.round(cubie.position.y),
                            Math.round(cubie.position.z)
                        );
                        
                        cubie.rotation.set(
                            snapRotation(cubie.rotation.x),
                            snapRotation(cubie.rotation.y),
                            snapRotation(cubie.rotation.z)
                        );
                    });
                    
                    rubiksCube.cubies.forEach(cubie => {
                        cubie.userData.originalX = Math.round(cubie.position.x);
                        cubie.userData.originalY = Math.round(cubie.position.y);
                        cubie.userData.originalZ = Math.round(cubie.position.z);
                    });
                }
            }
            
            animate();
        }
        
        // Rotate entire cube around Z axis
        function rotateCubeZ() {
            if (rubiksCube.isAnimating) return;
            
            const duration = 1000;
            const startTime = Date.now();
            const angle = Math.PI / 2;
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeProgress = easeInOutCubic(progress);
                const currentAngle = angle * easeProgress;
                
                rubiksCube.cubies.forEach(cubie => {
                    const originalPos = new THREE.Vector3(
                        cubie.userData.originalX,
                        cubie.userData.originalY,
                        cubie.userData.originalZ
                    );
                    
                    const newPos = originalPos.clone();
                    newPos.applyAxisAngle(new THREE.Vector3(0, 0, 1), currentAngle);
                    cubie.position.copy(newPos);
                    
                    cubie.rotation.z = currentAngle;
                });
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    rubiksCube.cubies.forEach(cubie => {
                        cubie.position.set(
                            Math.round(cubie.position.x),
                            Math.round(cubie.position.y),
                            Math.round(cubie.position.z)
                        );
                        
                        cubie.rotation.set(
                            snapRotation(cubie.rotation.x),
                            snapRotation(cubie.rotation.y),
                            snapRotation(cubie.rotation.z)
                        );
                    });
                    
                    rubiksCube.cubies.forEach(cubie => {
                        cubie.userData.originalX = Math.round(cubie.position.x);
                        cubie.userData.originalY = Math.round(cubie.position.y);
                        cubie.userData.originalZ = Math.round(cubie.position.z);
                    });
                }
            }
            
            animate();
        }
        
        // Update status message
        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }
        
        // Handle window resize
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        // Initialize the application
        function init() {
            initScene();
            createRubiksCube();
            
            // Set up event listeners
            document.getElementById('scrambleBtn').addEventListener('click', scrambleCube);
            document.getElementById('solveBtn').addEventListener('click', solveCube);
            document.getElementById('resetBtn').addEventListener('click', resetCube);
            document.getElementById('rotateXBtn').addEventListener('click', rotateCubeX);
            document.getElementById('rotateYBtn').addEventListener('click', rotateCubeY);
            document.getElementById('rotateZBtn').addEventListener('click', rotateCubeZ);
            
            // Start animation loop
            animate();
            
            updateStatus('准备就绪 - 点击"打乱魔方"开始');
        }
        
        // Initialize when page loads
        window.addEventListener('load', init);
    </script>
</body>
