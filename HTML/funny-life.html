<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>逗比人生2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;min-height:100dvh}
.app{max-width:100%;min-height:100vh;min-height:100dvh;padding:15px;position:relative}

/* 开始界面 */
.start-screen{text-align:center;padding-top:15vh}
.title{font-size:clamp(28px,8vw,42px);margin-bottom:10px;text-shadow:2px 2px 0 #ff6b6b}
.subtitle{color:#aaa;font-size:14px;margin-bottom:25px}
.input-box{width:100%;max-width:320px;padding:14px 18px;font-size:16px;border:2px solid #ffd700;border-radius:12px;background:rgba(255,255,255,0.1);color:#fff;text-align:center;margin:15px 0}
.input-box::placeholder{color:rgba(255,255,255,0.4)}
.btn{width:100%;max-width:320px;padding:16px;font-size:18px;font-weight:bold;border:none;border-radius:12px;cursor:pointer;margin:8px 0;transition:transform 0.15s}
.btn:active{transform:scale(0.96)}
.btn-gold{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#1a1a2e}
.btn-green{background:linear-gradient(135deg,#4CAF50,#45a049);color:#fff}
.btn-gray{background:rgba(255,255,255,0.15);color:#fff}
.tips{color:#888;font-size:12px;margin-top:20px;line-height:1.8}

/* 游戏界面 */
.game-screen{display:none}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:15px}
.stat-item{background:rgba(255,255,255,0.08);border-radius:10px;padding:8px 4px;text-align:center}
.stat-icon{font-size:20px}
.stat-num{font-size:14px;font-weight:bold;margin:2px 0}
.stat-bar{height:4px;background:rgba(255,255,255,0.15);border-radius:2px;overflow:hidden}
.stat-fill{height:100%;border-radius:2px;transition:width 0.3s}

/* 事件卡 */
.event-card{background:linear-gradient(135deg,rgba(255,255,255,0.1),rgba(255,255,255,0.05));border-radius:16px;padding:20px;margin-bottom:15px;border:1px solid rgba(255,255,255,0.1)}
.age-badge{text-align:center;margin-bottom:12px}
.age-num{font-size:clamp(36px,12vw,52px);font-weight:bold;color:#ffd700;display:block}
.age-label{font-size:12px;color:#aaa}
.event-text{font-size:16px;line-height:1.8;margin-bottom:18px;min-height:80px}
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{width:100%;padding:14px 16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:12px;color:#fff;font-size:15px;text-align:left;cursor:pointer;transition:all 0.2s;line-height:1.5}
.choice-btn:active{background:rgba(255,215,0,0.2);border-color:#ffd700}
.choice-btn:disabled{opacity:0.4}

/* 副本入口 */
.dungeon-entry{background:linear-gradient(135deg,#4a148c,#7b1fa2);border-radius:16px;padding:20px;margin:15px 0;text-align:center;animation:pulse 2s infinite}
.dungeon-entry h3{font-size:20px;margin-bottom:8px}
.dungeon-entry p{font-size:13px;color:#e1bee7}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(156,39,176,0.4)}50%{box-shadow:0 0 20px 10px rgba(156,39,176,0.2)}}

/* 结局界面 */
.end-screen{display:none;text-align:center}
.tombstone{background:linear-gradient(180deg,#3a3a3a,#2a2a2a);border-radius:20px;padding:25px;margin:20px 0;border:2px solid #555}
.tomb-emoji{font-size:48px;margin-bottom:10px}
.tomb-name{font-size:22px;color:#ffd700;margin-bottom:8px}
.tomb-age{color:#888;font-size:14px;margin-bottom:15px}
.tomb-cause{color:#ff6b6b;font-size:14px;margin:12px 0}
.tomb-epitaph{color:#ccc;font-style:italic;margin:15px 0;line-height:1.8;font-size:14px}
.achievements{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:15px}
.achievement{background:rgba(255,215,0,0.15);border:1px solid #ffd700;padding:6px 12px;border-radius:20px;font-size:12px;color:#ffd700}
.no-achievement{color:#666;font-size:12px;margin-top:10px}

/* 弹窗 */
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-content{background:linear-gradient(135deg,#2a2a4a,#1a1a3a);border-radius:20px;padding:25px;max-width:350px;width:100%;text-align:center;border:2px solid #ffd700}
.modal-content h3{font-size:20px;color:#ffd700;margin-bottom:15px}
.modal-content p{font-size:14px;line-height:1.8;margin-bottom:15px}
.modal.hidden{display:none}

/* 通知 */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);padding:10px 20px;border-radius:25px;font-size:14px;z-index:200;animation:toastIn 0.3s;border:1px solid}
.toast.good{border-color:#4CAF50;color:#4CAF50}
.toast.bad{border-color:#f44336;color:#f44336}
.toast.info{border-color:#ffd700;color:#ffd700}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* 动画 */
.fade-in{animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.shake{animation:shake 0.4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
</style>
</head>
<body>
<div class="app">
    <!-- 开始界面 -->
    <div id="startScreen" class="start-screen">
        <div class="title">🎭 逗比人生</div>
        <p class="subtitle">2026版 | 体验一段离谱的人生</p>
        <input type="text" id="nameInput" class="input-box" placeholder="取个名字开始人生..." maxlength="8">
        <button class="btn btn-gold" onclick="startGame()">开始人生！</button>
        <div class="tips">
            💀 随时可能离谱地死去<br>
            🎯 选择会影响未来走向<br>
            🏆 解锁各种奇葩成就
        </div>
    </div>

    <!-- 游戏界面 -->
    <div id="gameScreen" class="game-screen">
        <div class="stats-bar">
            <div class="stat-item"><div class="stat-icon">💰</div><div class="stat-num" id="statMoney">50</div><div class="stat-bar"><div class="stat-fill" id="moneyBar" style="width:50%;background:#ffd700"></div></div></div>
            <div class="stat-item"><div class="stat-icon">😊</div><div class="stat-num" id="statHappy">50</div><div class="stat-bar"><div class="stat-fill" id="happyBar" style="width:50%;background:#4CAF50"></div></div></div>
            <div class="stat-item"><div class="stat-icon">❤️</div><div class="stat-num" id="statHealth">100</div><div class="stat-bar"><div class="stat-fill" id="healthBar" style="width:100%;background:#f44336"></div></div></div>
            <div class="stat-item"><div class="stat-icon">⭐</div><div class="stat-num" id="statFame">0</div><div class="stat-bar"><div class="stat-fill" id="fameBar" style="width:0%;background:#9c27b0"></div></div></div>
        </div>
        <div class="event-card fade-in" id="eventCard">
            <div class="age-badge"><span class="age-num" id="ageNum">0</span><span class="age-label">岁</span></div>
            <div class="event-text" id="eventText"></div>
            <div class="choices" id="choices"></div>
        </div>
        <div id="dungeonArea"></div>
    </div>

    <!-- 结局界面 -->
    <div id="endScreen" class="end-screen">
        <div class="tombstone fade-in">
            <div class="tomb-emoji" id="tombEmoji">⚰️</div>
            <div class="tomb-name" id="tombName"></div>
            <div class="tomb-age" id="tombAge"></div>
            <div class="tomb-cause" id="tombCause"></div>
            <div class="tomb-epitaph" id="tombEpitaph"></div>
            <div class="achievements" id="tombAchievements"></div>
        </div>
        <button class="btn btn-green" onclick="shareLife()">📋 复制人生简历</button>
        <button class="btn btn-gray" onclick="location.reload()">🔄 再来一局</button>
    </div>
</div>

<!-- 副本弹窗 -->
<div id="dungeonModal" class="modal hidden">
    <div class="modal-content">
        <h3 id="dungeonTitle">🎮 副本开启！</h3>
        <p id="dungeonDesc"></p>
        <div id="dungeonChoices" class="choices"></div>
    </div>
</div>

{t:'📱 画了一堆网红在直播',e:{fame:15},r:'你画了好多人对着手机说话。老师问这是什么，你说："他们在直播赚钱！" 老师陷入了沉思...'},

]}
],

{t:'😎 "我穿的是限定款"',e:{fame:10},cond:function(){return P.money>70},r:'你淡定地说自己的衣服是限定款（其实是妈妈随便买的）。同学们都投来羡慕的目光，你心虚但很快乐。'}
]},
{t:'第一次考试！{name}考了：',c:[

],
7:[

{t:'😎 "我不需要"',e:{study:10},r:'你说你不需要！其实是因为买不起...但你说服了自己，把精力放在学习上。这种自我PUA以后很有用。'}
]},

{t:'⚽ 参加足球赛，踢得很菜',e:{health:10},r:'你踢足球踢得一塌糊涂，球都碰不到几次。但重在参与，老师还是给你发了参与奖。'},

],
8:[

{t:'📝 作业没写完',e:{study:-10},r:'你作业没写完被老师发现了！妈妈帮你解释说是她没督促好，然后回家你的屁股开了花...'},
{t:'🥊 和同学打架',e:{charm:10},r:'你和同学打了一架！虽然打赢了，但爸妈被叫去道歉。回家后他们居然偷偷夸你"有血性"...'},
{t:'🎤 在课堂上唱孤勇者',e:{fame:20,imagination:10},cond:function(){return P.flags.sing_guyong},r:'你突然在课堂上唱起了孤勇者！全班同学都跟着唱，老师都崩溃了。但你的表演确实很有感染力！'}
]},
{t:'{name}8岁，开始学特长班：',c:[
{t:'🎹 钢琴班',e:{study:15,charm:10,imagination:10},r:'你开始学钢琴了！虽然手指很短，但弹得还不错。妈妈说这叫"培养艺术气质"...'},
{t:'🏊 游泳班',e:{health:25},r:'你学会了游泳！从此不怕水了，还瘦了一圈。爸妈觉得这笔投资很值。'},
{t:'💻 编程班',e:{study:20,imagination:20},f:'learn_code',r:'你开始学编程了！虽然只会写"Hello World"，但你觉得自己已经是天才程序员了。'},

{t:'😤 啥都不学',e:{happy:10},r:'你拒绝了所有特长班！"我就要玩！" 妈妈无奈，但你的童年确实很快乐。'}
]}
],
9:[

]},
{t:'学校组织春游！{name}带了什么：',c:[
{t:'🍱 妈妈做的便当',e:{happy:15},r:'妈妈给你做了超级豪华的便当！同学们都围过来蹭吃的，你成了全场焦点。'},
{t:'🍔 肯德基全家桶',e:{happy:20,money:-10},r:'你带了肯德基全家桶！同学们都馋哭了，你大方地分给大家。快乐就是这么简单。'},

]}
],

{t:'😎 没什么感觉',e:{study:10},r:'新同学对你来说只是普通同学。你更关心今天的作业和明天的考试，感情什么的太麻烦了。'}
]},
{t:'{name}10岁生日，收到的礼物：',c:[
{t:'🎮 Switch',e:{happy:25,money:-5},r:'爸妈送了你Switch！你开心得跳起来！从此以后每天都要玩两小时，成绩开始下滑...'},
{t:'📱 手机',e:{happy:20,fame:10},r:'你终于有自己的手机了！第一时间下载了各种app，加入了班级群，感觉自己长大了。'},
{t:'📚 全套百科全书',e:{study:25,imagination:15},r:'爸妈送了你一套百科全书...虽然你想玩游戏机，但这些书确实挺有意思的。你的知识量暴增。'},

]}
],
11:[

{t:'🛏️ "躺平过一生"',e:{happy:15,fame:10},r:'你写了一篇"躺平宣言"！老师看完后沉默了很久，然后给了你一个奇怪的表情。这篇文章在家长群传开了。'},
{t:'🌍 "改变世界"',e:{fame:15,imagination:10},r:'你写了一个改变世界的伟大理想！虽然很空泛，但老师被你的热情感动，给了你全班最高分。'}
]}
],
12:[

{t:'📚 追求学习',e:{study:20},r:'当大家都在追星的时候，你在追着做题。虽然看起来不合群，但你的成绩证明了一切。'}

14:[

// ========== 辅助函数 ==========
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function random(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function randBool(p){return Math.random()<(p||0.5)}

function showToast(msg,type){
    var t=document.createElement('div');
    t.className='toast '+type;
    t.textContent=msg;
    document.body.appendChild(t);
    setTimeout(function(){t.remove()},1500);
}

function updateStats(){
    P.money=clamp(P.money,0,100);
    P.happy=clamp(P.happy,0,100);
    P.health=clamp(P.health,0,100);
    P.fame=clamp(P.fame,0,100);
    document.getElementById('statMoney').textContent=Math.round(P.money);
    document.getElementById('statHappy').textContent=Math.round(P.happy);
    document.getElementById('statHealth').textContent=Math.round(P.health);
    document.getElementById('statFame').textContent=Math.round(P.fame);
    document.getElementById('moneyBar').style.width=P.money+'%';
    document.getElementById('happyBar').style.width=P.happy+'%';
    document.getElementById('healthBar').style.width=P.health+'%';
    document.getElementById('fameBar').style.width=P.fame+'%';
}

// ========== 游戏逻辑 ==========
function startGame(){
    var name=document.getElementById('nameInput').value.trim()||'无名氏';
    P.name=name;
    var bg=BACKGROUNDS[random(0,BACKGROUNDS.length-1)];
    P.background=bg.name;
    P.backgroundName=bg.name;
    P.money=bg.money;P.happy=bg.happy;
    P.study=bg.study;P.charm=bg.charm;
    P.flags.background_desc=bg.desc;
    
    document.getElementById('startScreen').style.display='none';
    document.getElementById('gameScreen').style.display='block';
    
    updateStats();
    showEvent(0);
    showToast(bg.emoji+' 出生在'+bg.name+' - '+bg.desc,'info');
}

function showEvent(age){
    P.age=age;
    document.getElementById('ageNum').textContent=age;
    
    // 检查副本触发（10%概率，5岁后）
    if(age>=5&&Math.random()<0.12){
        triggerDungeon();
        return;
    }
    
    var evts=EVENTS[age];
    if(!evts){nextAge();return;}
    
    var evt=evts[random(0,evts.length-1)];
    var text=typeof evt.t==='function'?evt.t():evt.t;
    text=text.replace(/{name}/g,P.name)
             .replace(/{bg_desc}/g,P.flags.background_desc||'')
             .replace(/{extra}/g,['哭声特别大','长得特别可爱','眼睛特别有神','手脚特别灵活'][random(0,3)])
             .replace(/{extra2}/g,['天边出现彩虹','出生时猫叫了三声','窗外有喜鹊叫','刚好是午夜十二点'][random(0,3)]);
    
    document.getElementById('eventText').textContent=text;
    var cd=document.getElementById('choices');
    cd.innerHTML='';
    
    evt.c.forEach(function(ch){
        if(ch.cond&&!ch.cond())return;
        var btn=document.createElement('button');
        btn.className='choice-btn';
        btn.textContent=ch.t;
        btn.onclick=function(){makeChoice(ch)};
        cd.appendChild(btn);
    });
    
    document.getElementById('eventCard').classList.remove('fade-in');
    void document.getElementById('eventCard').offsetWidth;
    document.getElementById('eventCard').classList.add('fade-in');
}

function makeChoice(ch){
    // 先显示剧情结果
    if(ch.r){
        showResult(ch.r, function(){
            applyChoice(ch);
        });
    } else {
        applyChoice(ch);
    }
}

function showResult(text, callback){
    document.getElementById('eventText').innerHTML = '<div style="color:#ffd700;margin-bottom:10px">📌 结果：</div>' + text;
    var btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = '继续 ▶️';
    btn.onclick = function(){
        if(callback) callback();
        else nextAge();
    };
    document.getElementById('choices').innerHTML = '';
    document.getElementById('choices').appendChild(btn);
}

function applyChoice(ch){
    // 清除待执行回调
    window._pendingCallback = null;
    
    if(ch.e){
        ['money','happy','health','fame','study','charm','luck','imagination'].forEach(function(k){
            if(ch.e[k]){
                P[k]+=ch.e[k];
                if(k!=='luck'&&k!=='study'&&k!=='charm'&&k!=='imagination'&&ch.e[k]>0)
                    showToast('+'+ch.e[k]+' '+({money:'💰',happy:'😊',health:'❤️',fame:'⭐'}[k]||k),'good');
                if(ch.e[k]<0&&k!=='luck'&&k!=='study'&&k!=='charm'&&k!=='imagination')
                    showToast(ch.e[k]+' '+({money:'💰',happy:'😊',health:'❤️',fame:'⭐'}[k]||k),'bad');
            }
        });
    }
    if(ch.f)P.flags[ch.f]=true;
    if(ch.f&&ch.f.includes('躺平'))P.flags.躺平_count=(P.flags.躺平_count||0)+1;
    
    updateStats();
    
    // 死亡检查
    if(P.health<=0){die('因健康值归零而去世','💀');return;}
    if(P.happy<=0){die('因抑郁而离开人世','😢');return;}
    if(P.money<-30){die('因负债累累而崩溃','💸');return;}
    
    // 随机死亡
    if(randBool(0.04)){checkRandomDeath();return;}
    
    nextAge(); // 进入下一阶段
}

function nextAge(){
    var next=P.age+random(1,2);
    while(next<=120&&!EVENTS[next]){next++;}
    if(next>120){die('寿终正寝，活到了120岁！','🎉');return;}
    if(randBool(0.03)){checkRandomDeath();return;}
    showEvent(next);
}

function checkRandomDeath(){
    for(var i=0;i<RANDOM_DEATHS.length;i++){
        var d=RANDOM_DEATHS[i];
        if(P.age>=d.age[0]&&P.age<d.age[1]&&randBool(0.4)){
            die(d.t,d.icon);return;
        }
    }
    nextAge();
}

function triggerDungeon(){
    var d=DUNGEONS[random(0,DUNGEONS.length-1)];
    document.getElementById('dungeonTitle').textContent=d.name;
    document.getElementById('dungeonDesc').textContent=d.desc;
    var cd=document.getElementById('dungeonChoices');
    cd.innerHTML='';
    d.choices.forEach(function(ch){
        if(ch.cond&&!ch.cond())return;
        var btn=document.createElement('button');
        btn.className='choice-btn';
        btn.textContent=ch.t;
        btn.onclick=function(){
            // 应用效果
            if(ch.e){
                ['money','happy','health','fame','study','charm','luck','imagination'].forEach(function(k){
                    if(ch.e[k])P[k]+=ch.e[k];
                });
            }
            updateStats();
            document.getElementById('dungeonModal').classList.add('hidden');
            showToast(ch.text,'info');
            setTimeout(function(){nextAge();},800);
        };
        cd.appendChild(btn);
    });
    document.getElementById('dungeonModal').classList.remove('hidden');
}

function die(cause,icon){
    document.getElementById('gameScreen').style.display='none';
    document.getElementById('endScreen').style.display='block';
    
    document.getElementById('tombEmoji').textContent=icon||'⚰️';
    document.getElementById('tombName').textContent=P.name+' '+P.background;
    document.getElementById('tombAge').textContent='享年'+P.age+'岁 | 💰'+Math.round(P.money)+' 😊'+Math.round(P.happy)+' ❤️'+Math.round(P.health)+' ⭐'+Math.round(P.fame);
    document.getElementById('tombCause').textContent='死因：'+cause;
    
    var epitaphs=['来也匆匆，去也匆匆。','躺平了一生，也挺好。','卷了一辈子，终于可以休息了。','愿天堂没有996。','下辈子还做人。','人生如戏，全靠演技。','此生无悔，来世还来。','活着就是胜利。','平凡也是一种伟大。'];
    document.getElementById('tombEpitaph').textContent='「'+epitaphs[random(0,epitaphs.length-1)]+'」';
    
    var ad=document.getElementById('tombAchievements');
    ad.innerHTML='';
    var count=0;
    ACHIEVEMENTS_DEF.forEach(function(a){
        if(a.check()){
            P.achievements.push(a.name);
            ad.innerHTML+='<span class="achievement">'+a.icon+' '+a.name+'</span>';
            count++;
        }
    });
    if(count===0)ad.innerHTML='<div class="no-achievement">一个成就都没达成...</div>';
}

function shareLife(){
    var t='🎭 逗比人生\n';
    t+='出生：'+P.background+'\n';
    t+='享年：'+P.age+'岁\n';
    t+='属性：💰'+Math.round(P.money)+' 😊'+Math.round(P.happy)+' ❤️'+Math.round(P.health)+' ⭐'+Math.round(P.fame)+'\n';
    if(P.achievements.length)t+='成就：'+P.achievements.join('、')+'\n';
    t+='\n你的人生会怎样？来试试吧！';
    
    if(navigator.clipboard){
        navigator.clipboard.writeText(t).then(function(){showToast('已复制到剪贴板！','good');});
    }else{
        var ta=document.createElement('textarea');
        ta.value=t;document.body.appendChild(ta);
        ta.select();document.execCommand('copy');
        ta.remove();
        showToast('已复制到剪贴板！','good');
    }
}
</script>
</body>
</html>
