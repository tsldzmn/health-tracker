<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>元气骑士 - Soul Knight</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;font-family:'Microsoft YaHei',Arial,sans-serif}
#gameCanvas{position:fixed;top:0;left:0;z-index:1}
#startScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#0a0a2e,#1a1a4e);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
#startScreen h1{font-size:52px;color:#ffd700;text-shadow:0 0 20px #ff6b00;margin-bottom:8px;letter-spacing:8px}
.sub{color:#aaa;font-size:16px;margin-bottom:35px}
.heroSelect{display:flex;gap:20px;margin-bottom:35px;flex-wrap:wrap;justify-content:center}
.heroCard{width:110px;padding:12px 8px;background:rgba(255,255,255,0.08);border:2px solid #333;border-radius:12px;cursor:pointer;text-align:center;transition:all 0.2s}
.heroCard:hover,.heroCard.sel{border-color:#ffd700;transform:translateY(-5px);box-shadow:0 5px 20px rgba(255,215,0,0.3)}
.heroCard .emoji{font-size:36px;margin-bottom:6px}
.heroCard .hname{color:#fff;font-size:13px;font-weight:bold;margin-bottom:4px}
.heroCard .hdesc{color:#888;font-size:10px}
.heroCard .hstat{color:#aaa;font-size:10px;margin-top:5px;line-height:1.5}
#startBtn{padding:14px 60px;font-size:20px;background:linear-gradient(90deg,#ff6b00,#ff4500);color:#fff;border:none;border-radius:30px;cursor:pointer;font-weight:bold;letter-spacing:3px}
#startBtn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(255,107,0,0.6)}
.controls{color:#666;font-size:12px;margin-top:25px;text-align:center;line-height:2}
.controls span{color:#ffd700}
#hud{position:fixed;top:10px;left:10px;z-index:10;pointer-events:none;display:none}
.hudRow{display:flex;align-items:center;gap:15px;margin-bottom:5px}
.hearts{display:flex;gap:3px}
.heart{width:16px;height:16px;background:#ff4444;border-radius:50%;box-shadow:0 0 4px #ff4444}
.heart.empty{background:#444;box-shadow:none}
.hudText{color:#fff;font-size:13px;text-shadow:1px 1px 2px #000}
.hudGold{color:#ffd700}
#minimap{position:fixed;top:10px;right:10px;border:2px solid rgba(255,255,255,0.2);border-radius:8px;z-index:10;pointer-events:none;background:rgba(0,0,0,0.5);display:none}
#weaponSlot{position:fixed;bottom:15px;left:15px;background:rgba(0,0,0,0.7);border:2px solid #ffd700;border-radius:10px;padding:8px 14px;z-index:10;pointer-events:none;display:none;align-items:center;gap:10px}
#weaponSlot .wicon{font-size:22px}
#weaponSlot .wname{color:#ffd700;font-size:12px;font-weight:bold}
#weaponSlot .winfo{color:#aaa;font-size:10px}
#deathScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9998}
#deathScreen h2{font-size:48px;margin-bottom:15px}
#deathScreen p{color:#ccc;font-size:18px;margin-bottom:8px}
#deathScreen .score{color:#ffd700;font-size:24px;margin-bottom:25px}
#deathScreen button{padding:12px 40px;font-size:18px;background:linear-gradient(90deg,#ff6b00,#ff4500);color:#fff;border:none;border-radius:30px;cursor:pointer;font-weight:bold;margin:5px}
#levelMsg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#ffd700;font-size:40px;font-weight:bold;z-index:30;pointer-events:none;text-shadow:0 0 20px #ff6b00;display:none;text-align:center}
#pickupMsg{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);color:#fff;font-size:14px;z-index:20;pointer-events:none;opacity:0;transition:opacity 0.3s}
</style>
</head>
<body>
<div id="startScreen">
    <h1>元气骑士</h1>
    <div class="sub">SOUL KNIGHT - 3层地牢挑战</div>
    <div class="heroSelect" id="heroSelect"></div>
    <button id="startBtn">开始冒险</button>
    <div class="controls">
        <span>WASD</span> 移动 &nbsp;|&nbsp; <span>鼠标</span> 瞄准射击<br>
        <span>R</span> 换弹 &nbsp;|&nbsp; <span>1/2</span> 切换武器
    </div>
</div>
<canvas id="gameCanvas"></canvas>
<div id="hud">
    <div class="hudRow"><div class="hearts" id="hearts"></div></div>
    <div class="hudRow"><span class="hudText" id="ammoHud">弹药: ∞</span></div>
    <div class="hudRow"><span class="hudText hudGold" id="goldHud">💰 0</span></div>
    <div class="hudRow"><span class="hudText" id="floorHud">第 1/3 层</span></div>
</div>
<canvas id="minimap" width="120" height="120"></canvas>
<div id="weaponSlot">
    <span class="wicon" id="wIcon">🔫</span>
    <div><div class="wname" id="wName">手枪</div><div class="winfo" id="wInfo">弹药: ∞</div></div>
</div>
<div id="deathScreen">
    <h2 id="deathTitle">你倒下了!</h2>
    <p id="deathInfo"></p>
    <div class="score" id="finalScore"></div>
    <div><button id="restartBtn">再次挑战</button><button id="menuBtn" style="display:none">返回主菜单</button></div>
</div>
<div id="levelMsg"></div>
<div id="pickupMsg"></div>

<script>
// ====== 常量 ======
var TILE = 40;
var ROOM_W = 20, ROOM_H = 15;

var HEROES = [
    {name:'游侠',emoji:'🥷',hp:6,spd:3.5,color:'#4fc3f7',desc:'高机动',atk:1.0},
    {name:'骑士',emoji:'⚔️',hp:8,spd:2.8,color:'#ff7043',desc:'均衡',atk:1.2},
    {name:'法师',emoji:'🧙',hp:5,spd:3.0,color:'#ce93d8',desc:'高攻',atk:1.5},
    {name:'圣骑',emoji:'🛡️',hp:10,spd:2.3,color:'#ffd54f',desc:'肉盾',atk:0.9}
];

var WEAPONS = [
    {name:'手枪',emoji:'🔫',dmg:2.5,rate:15,ammo:9999,speed:10,spread:0.03,color:'#ffd700',size:4},
    {name:'霰弹枪',emoji:'💥',dmg:1.5,rate:10,ammo:20,speed:9,spread:0.4,pellets:5,color:'#ff6b6b',size:3},
    {name:'冲锋枪',emoji:'🔫',dmg:1.2,rate:3,ammo:50,speed:12,spread:0.1,color:'#ffa500',size:3},
    {name:'狙击枪',emoji:'🎯',dmg:10,rate:5,ammo:12,speed:16,spread:0,color:'#00d4ff',size:5},
    {name:'火箭炮',emoji:'🚀',dmg:6,rate:8,ammo:8,speed:7,spread:0,explode:true,color:'#ff4500',size:6}
];

// 3层敌人配置
var LEVEL_ENEMIES = [
    // 第1层：小鬼+蝙蝠
    [
        {name:'小鬼',hp:5,spd:1.5,dmg:1,rate:50,score:10,color:'#ff4444',size:14},
        {name:'蝙蝠',hp:3,spd:2.8,dmg:1,rate:30,score:12,color:'#aa44aa',size:11}
    ],
    // 第2层：弓箭手+骷髅+法师怪
    [
        {name:'骷髅',hp:8,spd:1.3,dmg:2,rate:50,score:20,color:'#cccccc',size:16},
        {name:'弓箭手',hp:5,spd:1.0,dmg:1,rate:40,score:18,color:'#44ff44',size:13,range:true},
        {name:'法师怪',hp:7,spd:0.8,dmg:2,rate:60,score:25,color:'#8844ff',size:14,range:true}
    ],
    // 第3层：混合+Boss
    [
        {name:'骷髅',hp:10,spd:1.5,dmg:2,rate:45,score:25,color:'#cccccc',size:16},
        {name:'法师怪',hp:8,spd:1,dmg:2,rate:50,score:30,color:'#8844ff',size:14,range:true}
    ]
];

var BOSS = {name:'暗黑魔王',hp:120,spd:0.8,dmg:3,rate:25,score:500,color:'#ff2222',size:45,range:true,isBoss:true};

// ====== Canvas ======
var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');
var mmCanvas = document.getElementById('minimap');
var mmCtx = mmCanvas.getContext('2d');
var W = innerWidth, H = innerHeight;
canvas.width = W; canvas.height = H;
addEventListener('resize', function(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; });

// ====== 游戏状态 ======
var selectedHero = 0;
var gameRunning = false;
var player = null;
var bullets = [];
var enemies = [];
var items = [];
var rooms = [];
var currentRoom = 0;
var floorNum = 0;
var gold = 0;
var score = 0;
var keysDown = {};
var mouseX = W/2, mouseY = H/2;
var mouseDown = false;
var cameraX = 0, cameraY = 0;
var shakeX = 0, shakeY = 0, shakeTimer = 0;
var msgTimer = 0;
var explosions = [];

// ====== 英雄选择 ======
var heroDiv = document.getElementById('heroSelect');
HEROES.forEach(function(h, i) {
    var d = document.createElement('div');
    d.className = 'heroCard' + (i === 0 ? ' sel' : '');
    d.innerHTML = '<div class="emoji">' + h.emoji + '</div><div class="hname">' + h.name + '</div><div class="hdesc">' + h.desc + '</div><div class="hstat">❤️' + h.hp + ' ⚡' + h.spd + ' ⚔️' + h.atk + '</div>';
    d.addEventListener('click', function() {
        document.querySelectorAll('.heroCard').forEach(function(c) { c.classList.remove('sel'); });
        d.classList.add('sel');
        selectedHero = i;
    });
    heroDiv.appendChild(d);
});

// ====== 按钮 ======
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', restartGame);
document.getElementById('menuBtn').addEventListener('click', function(){
    document.getElementById('deathScreen').style.display='none';
    document.getElementById('startScreen').style.display='flex';
});

// ====== 工具 ======
function lighten(hex, pct) {
    var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return 'rgb('+Math.min(255,r+pct)+','+Math.min(255,g+pct)+','+Math.min(255,b+pct)+')';
}

function showMsg(text, dur) {
    var el = document.getElementById('levelMsg');
    el.textContent = text; el.style.display = 'block';
    msgTimer = dur || 120;
}

function showPickup(text) {
    var el = document.getElementById('pickupMsg');
    el.textContent = text; el.style.opacity = '1';
    setTimeout(function(){ el.style.opacity = '0'; }, 1200);
}

// ====== 地牢生成 ======
function generateLevel(floor) {
    rooms = [];
    var size = 5;
    var map = [];
    for (var y = 0; y < size; y++) { map[y] = []; for (var x = 0; x < size; x++) map[y][x] = 0; }
    
    var cx = 2, cy = 2;
    map[cy][cx] = 1;
    rooms.push({x:cx, y:cy, enemies:[], doors:[], cleared:true, visited:false, isBoss:false});
    
    var roomCount = 4 + floor; // 第1层5个房间，第2层6个，第3层7个
    var dirs = [[0,-1],[0,1],[-1,0],[1,0]];
    
    for (var i = 0; i < roomCount; i++) {
        for (var attempt = 0; attempt < 30; attempt++) {
            var d = dirs[Math.random()*4|0];
            var nx = cx + d[0], ny = cy + d[1];
            if (nx >= 0 && nx < size && ny >= 0 && ny < size && map[ny][nx] === 0) {
                map[ny][nx] = 1;
                var isBoss = (i === roomCount - 1 && floor === 2); // 只有第3层最后一个房间是Boss
                var roomEnemies = [];
                
                if (!isBoss) {
                    var enemyPool = LEVEL_ENEMIES[Math.min(floor, LEVEL_ENEMIES.length-1)];
                    var eCount = 2 + floor + Math.floor(Math.random() * 3);
                    for (var e = 0; e < eCount; e++) {
                        var et = enemyPool[Math.floor(Math.random() * enemyPool.length)];
                        roomEnemies.push({
                            template: et,
                            x: 60 + Math.random() * (ROOM_W * TILE - 120),
                            y: 60 + Math.random() * (ROOM_H * TILE - 120)
                        });
                    }
                } else {
                    roomEnemies.push({template:BOSS, x:ROOM_W*TILE/2, y:ROOM_H*TILE/2, isBoss:true});
                }
                
                rooms.push({x:nx, y:ny, enemies:roomEnemies, doors:[], cleared:false, visited:false, isBoss:isBoss});
                cx = nx; cy = ny;
                break;
            }
        }
    }
    
    // 连接门
    rooms.forEach(function(room, idx) {
        dirs.forEach(function(d, i) {
            var tidx = rooms.findIndex(function(r) { return r.x === room.x+d[0] && r.y === room.y+d[1]; });
            if (tidx >= 0) {
                var px, py;
                if (i===0) { px=ROOM_W*TILE/2; py=0; }
                else if (i===1) { px=ROOM_W*TILE/2; py=ROOM_H*TILE; }
                else if (i===2) { px=0; py=ROOM_H*TILE/2; }
                else { px=ROOM_W*TILE; py=ROOM_H*TILE/2; }
                room.doors.push({x:px, y:py, dir:i, target:tidx, open:idx===0});
            }
        });
    });
    
    rooms[0].visited = true;
}

function loadRoom(idx) {
    currentRoom = idx;
    rooms[idx].visited = true;
    bullets = [];
    enemies = [];
    
    rooms[idx].enemies.forEach(function(e) {
        var mult = 1 + floorNum * 0.2;
        var en = {
            x:e.x, y:e.y, name:e.template.name,
            hp:Math.floor(e.template.hp * mult), maxHp:Math.floor(e.template.hp * mult),
            speed:e.template.spd, dmg:e.template.dmg, rate:e.template.rate,
            score:e.template.score, color:e.template.color, size:e.template.size||12,
            range:!!e.template.range, isBoss:!!e.isBoss,
            fireTimer:Math.floor(Math.random()*40), flash:0,
            moveAngle:Math.random()*Math.PI*2, moveTimer:0
        };
        if (e.isBoss) { en.hp = Math.floor(en.hp * 1.5); en.maxHp = en.hp; en.size = 45; }
        enemies.push(en);
    });
    
    // 清空当前房间的物品
    items = items.filter(function(item) { return item.roomIdx !== currentRoom; });
}

function enterRoom(idx) {
    var fromRoom = rooms[currentRoom];
    var toRoom = rooms[idx];
    var dx = toRoom.x - fromRoom.x;
    var dy = toRoom.y - fromRoom.y;
    
    loadRoom(idx);
    
    if (dx===1) { player.x=20; player.y=ROOM_H*TILE/2; }
    else if (dx===-1) { player.x=ROOM_W*TILE-20; player.y=ROOM_H*TILE/2; }
    else if (dy===1) { player.x=ROOM_W*TILE/2; player.y=20; }
    else if (dy===-1) { player.x=ROOM_W*TILE/2; player.y=ROOM_H*TILE-20; }
    
    if (toRoom.isBoss) showMsg('⚔️ BOSS战 ⚔️', 150);
}

function checkRoomCleared() {
    var alive = enemies.filter(function(e) { return e.hp > 0; });
    if (alive.length === 0) {
        rooms[currentRoom].cleared = true;
        rooms[currentRoom].doors.forEach(function(d) { d.open = true; });
        
        // 检查是否通关
        if (rooms[currentRoom].isBoss) {
            setTimeout(function() { victory(); }, 1000);
        } else {
            showMsg('✓ 房间清理!', 60);
        }
    }
}

function spawnItems(x, y, count) {
    for (var i = 0; i < count; i++) {
        var r = Math.random();
        var type = r < 0.5 ? 'coin' : (r < 0.8 ? 'ammo' : 'heart');
        items.push({
            x:x+(Math.random()-0.5)*50, y:y+(Math.random()-0.5)*50,
            type:type, timer:0, roomIdx:currentRoom,
            value: type==='coin' ? Math.ceil(Math.random()*3)+1 : 1,
            emoji: type==='coin' ? '💰' : (type==='heart' ? '❤️' : '🔫'),
            size:10
        });
    }
}

// ====== 更新 ======
function updatePlayer() {
    if (!player || player.hp <= 0) return;
    var dx = 0, dy = 0;
    if (keysDown['KeyW']||keysDown['ArrowUp']) dy = -1;
    if (keysDown['KeyS']||keysDown['ArrowDown']) dy = 1;
    if (keysDown['KeyA']||keysDown['ArrowLeft']) dx = -1;
    if (keysDown['KeyD']||keysDown['ArrowRight']) dx = 1;
    if (dx&&dy) { dx*=0.707; dy*=0.707; }
    
    player.x += dx * player.speed;
    player.y += dy * player.speed;
    player.x = Math.max(14, Math.min(ROOM_W*TILE-14, player.x));
    player.y = Math.max(14, Math.min(ROOM_H*TILE-14, player.y));
    
    if (player.invincible > 0) player.invincible--;
    if (player.fireTimer > 0) player.fireTimer--;
    
    var w = player.weapons[player.weaponIdx];
    var angle = Math.atan2(mouseY-H/2, mouseX-W/2);
    
    if (mouseDown && player.fireTimer <= 0) {
        var pellets = w.pellets || 1;
        if (w.ammo > 0 || w.ammo >= 9999) {
            for (var p = 0; p < pellets; p++) {
                var a = angle + (Math.random()-0.5) * w.spread * 2;
                bullets.push({
                    x:player.x, y:player.y,
                    vx:Math.cos(a)*w.speed, vy:Math.sin(a)*w.speed,
                    dmg:w.dmg * player.atk, color:w.color, size:w.size,
                    owner:'player', explode:!!w.explode, life:100
                });
            }
            if (w.ammo !== Infinity) w.ammo--;
            player.fireTimer = w.rate;
        }
    }
    
    // 门检测
    var room = rooms[currentRoom];
    if (room.cleared) {
        for (var di = 0; di < room.doors.length; di++) {
            var door = room.doors[di];
            if (!door.open) continue;
            var near = false;
            if (door.dir===0) near = Math.abs(player.x-door.x)<30 && player.y<35;
            else if (door.dir===1) near = Math.abs(player.x-door.x)<30 && player.y>ROOM_H*TILE-35;
            else if (door.dir===2) near = Math.abs(player.y-door.y)<30 && player.x<35;
            else near = Math.abs(player.y-door.y)<30 && player.x>ROOM_W*TILE-35;
            if (near) { enterRoom(door.target); return; }
        }
    }
}

function updateEnemies() {
    enemies.forEach(function(e) {
        if (e.hp <= 0) return;
        var dx = player.x - e.x, dy = player.y - e.y;
        var d = Math.hypot(dx, dy) || 1;
        
        e.moveTimer--;
        if (e.moveTimer <= 0) {
            e.moveTimer = 20 + Math.random() * 40;
            e.moveAngle = Math.atan2(dy, dx) + (Math.random()-0.5) * 0.8;
        }
        
        // 移动
        if (e.range && d < 180) {
            e.x -= (dx/d) * e.speed * 0.4;
            e.y -= (dy/d) * e.speed * 0.4;
        } else {
            e.x += Math.cos(e.moveAngle) * e.speed;
            e.y += Math.sin(e.moveAngle) * e.speed;
        }
        e.x = Math.max(e.size, Math.min(ROOM_W*TILE-e.size, e.x));
        e.y = Math.max(e.size, Math.min(ROOM_H*TILE-e.size, e.y));
        
        // 射击
        e.fireTimer--;
        if (e.fireTimer <= 0 && d < 350) {
            e.fireTimer = e.rate;
            var a = Math.atan2(dy, dx);
            bullets.push({
                x:e.x, y:e.y, vx:Math.cos(a)*4.5, vy:Math.sin(a)*4.5,
                dmg:e.dmg, color:'#ff6666', size:4, owner:'enemy', explode:false, life:100
            });
        }
        
        // 碰撞伤害
        if (d < player.size + e.size - 5 && player.invincible <= 0) {
            player.hp -= e.dmg;
            player.invincible = 50;
            shakeTimer = 10;
            if (player.hp <= 0) playerDie();
        }
    });
}

function updateBullets() {
    for (var i = bullets.length-1; i >= 0; i--) {
        var b = bullets[i];
        b.x += b.vx; b.y += b.vy; b.life--;
        
        if (b.life <= 0 || b.x < 0 || b.x > ROOM_W*TILE || b.y < 0 || b.y > ROOM_H*TILE) {
            if (b.explode && b.owner === 'player') spawnExplosion(b.x, b.y);
            bullets.splice(i, 1); continue;
        }
        
        if (b.owner === 'player') {
            for (var j = 0; j < enemies.length; j++) {
                var e = enemies[j];
                if (e.hp <= 0) continue;
                if (Math.hypot(e.x-b.x, e.y-b.y) < e.size + b.size) {
                    e.hp -= b.dmg; e.flash = 4; shakeTimer = 3;
                    if (b.explode) spawnExplosion(b.x, b.y);
                    bullets.splice(i, 1);
                    if (e.hp <= 0) {
                        score += e.score;
                        spawnItems(e.x, e.y, e.isBoss ? 10 : 2);
                        if (e.isBoss) { score += 500; showMsg('BOSS击杀! 🎉', 180); }
                        else { showPickup('+' + e.score + '分'); }
                        checkRoomCleared();
                    }
                    break;
                }
            }
        } else {
            if (player && Math.hypot(player.x-b.x, player.y-b.y) < player.size+b.size-4) {
                if (player.invincible <= 0) {
                    player.hp -= b.dmg; player.invincible = 40; shakeTimer = 8;
                    if (player.hp <= 0) playerDie();
                }
                bullets.splice(i, 1);
            }
        }
    }
}

function updateItems() {
    for (var i = items.length-1; i >= 0; i--) {
        var item = items[i];
        if (item.roomIdx !== currentRoom) continue;
        if (Math.hypot(player.x-item.x, player.y-item.y) < player.size + item.size) {
            if (item.type === 'coin') {
                gold += item.value; score += item.value * 10;
                showPickup('+' + item.value + ' 金币');
            } else if (item.type === 'heart') {
                if (player.hp < player.maxHp) { player.hp++; showPickup('+1 生命'); }
                else continue;
            } else if (item.type === 'ammo') {
                var w = player.weapons[player.weaponIdx];
                if (w.ammo !== Infinity) {
                    var orig = WEAPONS.find(function(ww){return ww.name===w.name;});
                    if (orig) w.ammo = orig.ammo;
                    showPickup('弹药补满!');
                }
            }
            items.splice(i, 1);
        }
    }
}

function spawnExplosion(x, y) {
    for (var i = 0; i < 10; i++) {
        var a = Math.random() * Math.PI * 2;
        explosions.push({x:x, y:y, vx:Math.cos(a)*3, vy:Math.sin(a)*3, life:15+Math.random()*10, color:'#ff8800'});
    }
}

function updateExplosions() {
    for (var i = explosions.length-1; i >= 0; i--) {
        var p = explosions[i];
        p.x += p.vx; p.y += p.vy; p.vx *= 0.9; p.vy *= 0.9; p.life--;
        if (p.life <= 0) explosions.splice(i, 1);
    }
}

function updateCamera() {
    if (!player) return;
    cameraX += (player.x - cameraX) * 0.12;
    cameraY += (player.y - cameraY) * 0.12;
    if (shakeTimer > 0) { shakeTimer--; shakeX=(Math.random()-0.5)*shakeTimer; shakeY=(Math.random()-0.5)*shakeTimer; }
    else { shakeX=0; shakeY=0; }
}

// ====== 绘制 ======
function drawRoom() {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, ROOM_W*TILE, ROOM_H*TILE);
    for (var ty = 0; ty < ROOM_H; ty++)
        for (var tx = 0; tx < ROOM_W; tx++) {
            ctx.fillStyle = (tx+ty)%2===0 ? '#1e1e3a' : '#1a1a2e';
            ctx.fillRect(tx*TILE, ty*TILE, TILE, TILE);
        }
    ctx.fillStyle = '#444466';
    ctx.fillRect(0, 0, ROOM_W*TILE, 5);
    ctx.fillRect(0, ROOM_H*TILE-5, ROOM_W*TILE, 5);
    ctx.fillRect(0, 0, 5, ROOM_H*TILE);
    ctx.fillRect(ROOM_W*TILE-5, 0, 5, ROOM_H*TILE);
    
    // Boss房间装饰
    if (rooms[currentRoom] && rooms[currentRoom].isBoss) {
        ctx.strokeStyle = 'rgba(255,0,0,0.3)';
        ctx.lineWidth = 3;
        ctx.strokeRect(30, 30, ROOM_W*TILE-60, ROOM_H*TILE-60);
    }
    
    // 门
    var room = rooms[currentRoom];
    if (room) {
        room.doors.forEach(function(d) {
            ctx.fillStyle = d.open ? '#2a4a2a' : '#664444';
            if (d.dir===0) ctx.fillRect(d.x-22, 0, 44, 8);
            else if (d.dir===1) ctx.fillRect(d.x-22, ROOM_H*TILE-8, 44, 8);
            else if (d.dir===2) ctx.fillRect(0, d.y-22, 8, 44);
            else ctx.fillRect(ROOM_W*TILE-8, d.y-22, 8, 44);
        });
    }
}

function drawPlayer() {
    if (!player || player.hp <= 0) return;
    var flash = player.invincible > 0 && Math.floor(player.invincible/4) % 2;
    if (flash) ctx.globalAlpha = 0.4;
    
    // 身体
    ctx.beginPath(); ctx.arc(player.x, player.y, 12, 0, Math.PI*2);
    var g = ctx.createRadialGradient(player.x-3, player.y-3, 0, player.x, player.y, 12);
    g.addColorStop(0, lighten(player.color, 50)); g.addColorStop(1, player.color);
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = '#222'; ctx.lineWidth = 2; ctx.stroke();
    
    // 眼睛
    var ea = Math.atan2(mouseY-H/2, mouseX-W/2);
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(player.x+Math.cos(ea)*6, player.y+Math.sin(ea)*6, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(player.x+Math.cos(ea)*7, player.y+Math.sin(ea)*7, 1.5, 0, Math.PI*2); ctx.fill();
    
    // 武器
    var w = player.weapons[player.weaponIdx];
    ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(ea);
    ctx.fillStyle = '#666'; ctx.fillRect(10, -2, 16, 4);
    ctx.restore();
    
    ctx.globalAlpha = 1;
}

function drawEnemies() {
    enemies.forEach(function(e) {
        if (e.hp <= 0) return;
        if (e.flash > 0) { e.flash--; ctx.globalAlpha = 0.5; }
        
        ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI*2);
        var g = ctx.createRadialGradient(e.x-3, e.y-3, 0, e.x, e.y, e.size);
        g.addColorStop(0, lighten(e.color, 40)); g.addColorStop(1, e.color);
        ctx.fillStyle = g; ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
        
        // 眼睛
        var pa = Math.atan2(player.y-e.y, player.x-e.x);
        ctx.fillStyle = '#fff';
        var ex = e.x + Math.cos(pa)*e.size*0.4, ey = e.y + Math.sin(pa)*e.size*0.4;
        ctx.beginPath(); ctx.arc(ex-4, ey, e.size*0.12, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex+4, ey, e.size*0.12, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#f00';
        ctx.beginPath(); ctx.arc(ex-4, ey, e.size*0.06, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex+4, ey, e.size*0.06, 0, Math.PI*2); ctx.fill();
        
        // 血条
        if (e.hp < e.maxHp) {
            var bw = e.size * 2;
            ctx.fillStyle = '#333'; ctx.fillRect(e.x-bw/2, e.y-e.size-10, bw, 5);
            ctx.fillStyle = '#ff4444'; ctx.fillRect(e.x-bw/2, e.y-e.size-10, bw*(e.hp/e.maxHp), 5);
        }
        
        // Boss名字
        if (e.isBoss) {
            ctx.fillStyle = '#ffd700'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center';
            ctx.fillText('👑 ' + e.name, e.x, e.y - e.size - 18);
        }
        
        ctx.globalAlpha = 1;
    });
}

function drawBullets() {
    bullets.forEach(function(b) {
        ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2);
        ctx.fillStyle = b.color;
        ctx.shadowColor = b.color; ctx.shadowBlur = 6;
        ctx.fill(); ctx.shadowBlur = 0;
    });
}

function drawItems() {
    items.forEach(function(item) {
        if (item.roomIdx !== currentRoom) return;
        item.timer += 0.05;
        ctx.font = '16px Arial'; ctx.textAlign = 'center';
        ctx.fillText(item.emoji, item.x, item.y + Math.sin(item.timer)*3);
    });
}

function drawExplosions() {
    explosions.forEach(function(p) {
        ctx.globalAlpha = p.life/25;
        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
        ctx.fillStyle = p.color; ctx.fill();
    });
    ctx.globalAlpha = 1;
}

function drawMinimap() {
    mmCtx.clearRect(0, 0, 120, 120);
    mmCtx.fillStyle = 'rgba(0,0,0,0.8)'; mmCtx.fillRect(0, 0, 120, 120);
    var s = 16, ox = 60-2.5*s, oy = 60-2*s;
    rooms.forEach(function(r, i) {
        if (!r.visited) return;
        mmCtx.fillStyle = i===currentRoom ? '#ffd700' : (r.cleared ? '#44aa44' : '#aa4444');
        mmCtx.fillRect(ox+r.x*s+1, oy+r.y*s+1, s-2, s-2);
        if (r.isBoss) {
            mmCtx.fillStyle = '#ff0000';
            mmCtx.fillRect(ox+r.x*s+3, oy+r.y*s+3, s-6, s-6);
        }
    });
}

function drawCrosshair() {
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(mouseX, mouseY, 12, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mouseX-18,mouseY); ctx.lineTo(mouseX-6,mouseY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mouseX+6,mouseY); ctx.lineTo(mouseX+18,mouseY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mouseX,mouseY-18); ctx.lineTo(mouseX,mouseY-6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mouseX,mouseY+6); ctx.lineTo(mouseX,mouseY+18); ctx.stroke();
}

function updateHUD() {
    if (!player) return;
    var h = document.getElementById('hearts'); h.innerHTML = '';
    for (var i = 0; i < player.maxHp; i++) {
        var d = document.createElement('div');
        d.className = 'heart' + (i >= player.hp ? ' empty' : '');
        h.appendChild(d);
    }
    var w = player.weapons[player.weaponIdx];
    document.getElementById('wIcon').textContent = w.emoji;
    document.getElementById('wName').textContent = w.name;
    document.getElementById('wInfo').textContent = w.ammo >= 9999 ? '弹药: ∞' : '弹药: ' + w.ammo;
    document.getElementById('goldHud').textContent = '💰 ' + gold;
    document.getElementById('floorHud').textContent = '第 ' + (floorNum+1) + '/3 层';
}

// ====== 主循环 ======
function gameLoop() {
    if (!gameRunning) return;
    
    updatePlayer();
    updateEnemies();
    updateBullets();
    updateItems();
    updateExplosions();
    updateCamera();
    
    if (msgTimer > 0) { msgTimer--; if (msgTimer<=0) document.getElementById('levelMsg').style.display='none'; }
    
    ctx.save();
    ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, W, H);
    ctx.translate(W/2-cameraX+shakeX, H/2-cameraY+shakeY);
    drawRoom(); drawItems(); drawBullets(); drawExplosions(); drawEnemies(); drawPlayer();
    ctx.restore();
    drawCrosshair(); drawMinimap(); updateHUD();
    
    requestAnimationFrame(gameLoop);
}

// ====== 游戏流程 ======
function startGame() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('deathScreen').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('minimap').style.display = 'block';
    document.getElementById('weaponSlot').style.display = 'flex';
    
    floorNum = 0; gold = 0; score = 0;
    var hero = HEROES[selectedHero];
    player = {
        x: ROOM_W*TILE/2, y: ROOM_H*TILE/2,
        maxHp: hero.hp, hp: hero.hp, speed: hero.spd, atk: hero.atk, color: hero.color,
        weapons: [JSON.parse(JSON.stringify(WEAPONS[0]))], weaponIdx: 0,
        fireTimer: 0, invincible: 60, size: 12
    };
    cameraX = player.x; cameraY = player.y;
    items = []; explosions = [];
    
    generateLevel(floorNum);
    loadRoom(0);
    
    gameRunning = true;
    showMsg('第 1 层 - 入口', 100);
    requestAnimationFrame(gameLoop);
}

function nextLevel() {
    floorNum++;
    if (floorNum >= 3) { victory(); return; }
    
    player.x = ROOM_W*TILE/2;
    player.y = ROOM_H*TILE/2;
    player.invincible = 90;
    // 补充血量
    player.hp = Math.min(player.maxHp, player.hp + 2);
    
    generateLevel(floorNum);
    loadRoom(0);
    
    showMsg('第 ' + (floorNum+1) + ' 层', 120);
}

function playerDie() {
    gameRunning = false;
    document.getElementById('deathTitle').textContent = '你倒下了!';
    document.getElementById('deathTitle').style.color = '#ff4444';
    document.getElementById('deathInfo').textContent = '到达第 ' + (floorNum+1) + ' 层';
    document.getElementById('finalScore').textContent = '得分: ' + score + ' | 金币: ' + gold;
    document.getElementById('menuBtn').style.display = 'inline-block';
    document.getElementById('deathScreen').style.display = 'flex';
}

function victory() {
    gameRunning = false;
    score += 1000;
    document.getElementById('deathTitle').textContent = '🎉 通关! 🎉';
    document.getElementById('deathTitle').style.color = '#ffd700';
    document.getElementById('deathInfo').textContent = '恭喜通关全部3层地牢!';
    document.getElementById('finalScore').textContent = '最终得分: ' + score + ' | 金币: ' + gold;
    document.getElementById('menuBtn').style.display = 'inline-block';
    document.getElementById('deathScreen').style.display = 'flex';
}

function restartGame() {
    document.getElementById('deathScreen').style.display = 'none';
    startGame();
}

// ====== 输入 ======
document.addEventListener('mousemove', function(e) { mouseX=e.clientX; mouseY=e.clientY; });
document.addEventListener('mousedown', function() { if(gameRunning) mouseDown=true; });
document.addEventListener('mouseup', function() { mouseDown=false; });
document.addEventListener('touchstart', function(e) { if(gameRunning){mouseDown=true;mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY;} }, {passive:false});
document.addEventListener('touchmove', function(e) { if(gameRunning){e.preventDefault();mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY;} }, {passive:false});
document.addEventListener('touchend', function() { mouseDown=false; });

document.addEventListener('keydown', function(e) {
    keysDown[e.code] = true;
    if (!gameRunning || !player) return;
    if (e.code === 'KeyR') {
        var w = player.weapons[player.weaponIdx];
        if (w.ammo < 9999) {
            var orig = WEAPONS.find(function(ww){return ww.name===w.name;});
            if (orig) w.ammo = orig.ammo;
        }
    }
    if (e.code === 'Digit1') player.weaponIdx = 0;
    if (e.code === 'Digit2' && player.weapons.length > 1) player.weaponIdx = 1;
    if (e.code === 'Digit3' && player.weapons.length > 2) player.weaponIdx = 2;
    
    // 进入下一层检测（站在门上按F）
    if (e.code === 'KeyF') {
        var room = rooms[currentRoom];
        var allCleared = room.cleared;
        // 检查是否所有房间都清理完了，看看能不能进入下一层
        var exitDoor = room.doors.find(function(d) {
            return !rooms[d.target] || rooms[d.target].isBoss;
        });
        // 如果当前房间是最后一层的boss房间前的房间，且已清理
        if (allCleared && floorNum < 2) {
            var hasUncleared = rooms.some(function(r, i) { return !r.cleared && !r.visited; });
            if (!hasUncleared) {
                nextLevel();
            }
        }
    }
});
document.addEventListener('keyup', function(e) { keysDown[e.code]=false; });
</script>
